<!DOCTYPE html>
<html>
<body style="font-family:Arial;text-align:center;margin-top:50px;">

<h2>Simple Interest Calculator</h2>

<input type="number" id="p" placeholder="Principal"><br><br>
<input type="number" id="r" placeholder="Rate"><br><br>
<input type="number" id="t" placeholder="Time"><br><br>

<button onclick="calculateSI()" 
style="padding:8px 15px;background:blue;color:white;border:none;">
Calculate
</button>

<p id="result"></p>

<script>
function calculateSI() {
    let p = document.getElementById("p").value;
    let r = document.getElementById("r").value;
    let t = document.getElementById("t").value;

    let si = (p * r * t) / 100;

    document.getElementById("result").innerHTML =
    "Simple Interest = " + si;
}
</script>

</body>
</html>
